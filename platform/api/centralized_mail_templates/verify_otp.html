{% extends "base.html" %}

{% block content %}
<div style="padding: 20px; text-align: center; font-family: sans-serif;">
    <h1 style="color: #333;">Verify your email</h1>
    <p style="color: #666; font-size: 16px;">
        Use the following 6-digit code to complete your signup and verify your email address.
    </p>
    
    <div style="background-color: #f4f4f4; border-radius: 8px; padding: 20px; margin: 30px 0; display: inline-block;">
        <span style="font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #000;">
            {{ otp_code }}
        </span>
    </div>
    
    <p style="color: #999; font-size: 14px;">
        This code will expire in 10 minutes. If you did not request this code, please ignore this email.
    </p>
    
</div>
{% endblock %}

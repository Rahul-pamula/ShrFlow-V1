<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>ShrFlow Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="ShrFlow — self-hosted, multi-tenant, high-performance email marketing platform documentation.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="assets/shrflow-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ─── TOKENS ──────────────────────────────────────────────── */
:root {
  --bg:          #f5f7fb;
  --bg-card:     #ffffff;
  --bg-sidebar:  #ffffff;
  --bg-hover:    #eef2f8;
  --border:      rgba(100,116,139,.18);
  --text:        #0f172a;
  --text-muted:  #475569;
  --text-dim:    #94a3b8;
  --accent:      #2558d9;
  --accent-soft: rgba(37,88,217,.08);
  --accent-ring: rgba(37,88,217,.2);
  --green:       #047857;
  --r:           6px;
  --sidebar-w:   268px;
  --ease:        cubic-bezier(.4,0,.2,1);

  /* docsify hooks */
  --theme-color:    var(--accent);
  --sidebar-width:  var(--sidebar-w);
  --base-font-size: 15px;
}

[data-theme="dark"] {
  --bg:          #0e1117;
  --bg-card:     #151a22;
  --bg-sidebar:  #111620;
  --bg-hover:    #1e2635;
  --border:      rgba(132,146,166,.14);
  --text:        #f3f5f7;
  --text-muted:  #96a0ae;
  --text-dim:    #5a6478;
  --accent:      #7b90ff;
  --accent-soft: rgba(123,144,255,.1);
  --accent-ring: rgba(123,144,255,.22);
  --green:       #10b981;
}

/* ─── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  font-size:var(--base-font-size);
  -webkit-font-smoothing:antialiased;
  background:var(--bg);
  color:var(--text);
  transition:background .2s var(--ease),color .2s var(--ease);
  min-height:100vh;
  overflow-y:scroll;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(37,88,217,.07), transparent 32%),
    radial-gradient(circle at 85% 15%, rgba(14,165,233,.06), transparent 24%);
  pointer-events:none;
  z-index:-1;
}

/* ─── SCROLL PROGRESS ─────────────────────────────────────── */
#scroll-progress{
  position:fixed;top:0;left:0;height:2.5px;width:0%;
  background:var(--accent);
  z-index:9999;transition:width .1s linear;
  border-radius:0 2px 2px 0;
}

/* ─── SIDEBAR ─────────────────────────────────────────────── */
.sidebar{
  background:var(--bg-sidebar) !important;
  border-right:1px solid var(--border) !important;
  box-shadow:none !important;
  padding:0 !important;
  display:flex;flex-direction:column;
  width:var(--sidebar-w) !important;
}

/* Brand */
.sidebar .app-name{
  display:block !important;
  padding:0 !important;margin:0 !important;
  border-bottom:1px solid var(--border) !important;
  flex-shrink:0;
}
.sidebar .app-name-link{
  display:flex !important;align-items:center !important;gap:10px !important;
  padding:16px 16px !important;
  text-decoration:none !important;
  transition:background .15s !important;
}
.sidebar .app-name-link:hover{background:var(--bg-hover) !important}
.sidebar .app-name-link img{
  width:24px !important;height:auto !important;
  flex-shrink:0 !important;border:none !important;
  box-shadow:none !important;background:transparent !important;
  transition:transform .3s cubic-bezier(.175,.885,.32,1.275) !important;
}
.sidebar .app-name-link:hover img{transform:rotate(8deg) scale(1.08) !important}

/* Brand text injected by JS */
.sf-brand{display:flex;flex-direction:column;gap:2px;flex:1}
.sf-name{
  font-size:.95rem;font-weight:800;letter-spacing:-.03em;line-height:1;
  color:var(--accent);
}
.sf-tag{
  font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-dim);
}

/* Theme toggle */
#theme-btn{
  margin-left:auto;
  background:transparent;border:1px solid var(--border);
  border-radius:var(--r);padding:5px 7px;cursor:pointer;
  color:var(--text-muted);font-size:.8rem;
  transition:all .15s var(--ease);line-height:1;
  flex-shrink:0;
}
#theme-btn:hover{background:var(--bg-hover);color:var(--text)}

/* Search */
.search{
  padding:10px 12px !important;
  border-bottom:1px solid var(--border) !important;
  flex-shrink:0;
}
.search input{
  width:100% !important;
  background:var(--bg-hover) !important;
  border:1.5px solid var(--border) !important;
  border-radius:var(--r) !important;
  color:var(--text) !important;
  font-family:'Plus Jakarta Sans',sans-serif !important;
  font-size:.82rem !important;font-weight:500 !important;
  padding:7px 10px !important;
  outline:none !important;box-shadow:none !important;
  transition:all .18s !important;
}
.search input:focus{
  background:var(--bg-card) !important;
  border-color:var(--accent) !important;
  box-shadow:0 0 0 3px var(--accent-ring) !important;
}
.search input::placeholder{color:var(--text-dim) !important}

/* Nav */
.sidebar-nav{padding:8px 0 48px !important;overflow-y:auto;flex:1}
.sidebar ul{
  margin:0 !important;
}
.sidebar-nav>ul>li>p,
.sidebar-nav>ul>li>strong{
  display:block !important;
  font-size:.65rem !important;font-weight:800 !important;
  letter-spacing:.1em !important;text-transform:uppercase !important;
  color:var(--text-dim) !important;
  padding:14px 16px 4px !important;margin:0 !important;
}
.sidebar-nav li a{
  display:block !important;
  padding:5px 12px !important;margin:1px 6px !important;
  border-radius:var(--r) !important;
  font-size:.84rem !important;font-weight:500 !important;
  color:var(--text-muted) !important;
  text-decoration:none !important;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:all .12s var(--ease) !important;
}
.sidebar-nav li a:hover{
  background:var(--bg-hover) !important;
  color:var(--text) !important;
}
.sidebar-nav li.active>a{
  background:var(--accent-soft) !important;
  color:var(--accent) !important;
  font-weight:700 !important;
  box-shadow:inset 3px 0 0 var(--accent) !important;
  border-radius:0 var(--r) var(--r) 0 !important;
  margin-left:0 !important;
  padding-left:18px !important;
}
.sidebar-nav ul ul{
  padding-left:8px !important;
  border-left:1.5px solid var(--border) !important;
  margin:2px 0 2px 18px !important;
}
.sidebar-nav ul ul li a{
  font-size:.81rem !important;
  padding:4px 10px !important;
}

/* ─── SEARCH RESULTS ──────────────────────────────────────── */
.search .results-panel{
  background:var(--bg-card) !important;
  border:1px solid var(--border) !important;
  border-radius:var(--r) !important;
  box-shadow:0 8px 24px rgba(0,0,0,.12) !important;
  margin-top:4px !important;
}
.search .results-panel .matching-post{
  border-bottom:1px solid var(--border) !important;
  padding:10px 13px !important;
}
.search .results-panel .matching-post:last-child{border-bottom:none !important}
.search .results-panel h2{
  font-size:.84rem !important;font-weight:600 !important;
  color:var(--text) !important;margin:0 0 2px !important;
  border:none !important;padding:0 !important;
}
.search .results-panel p{font-size:.78rem !important;color:var(--text-muted) !important;margin:0 !important}

/* ─── CONTENT ─────────────────────────────────────────────── */
.markdown-section{
  max-width:920px !important;
  padding:56px 48px 96px !important;
  margin:0 auto !important;
  animation:fadeUp .25s var(--ease) both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.content{
  left:var(--sidebar-w) !important;
  right:0 !important;
  padding:0 !important;
}

.markdown-section > :first-child{
  margin-top:0 !important;
}

.markdown-section h1{
  font-size:1.9rem !important;font-weight:800 !important;
  letter-spacing:-.04em !important;line-height:1.2 !important;
  color:var(--text) !important;
  margin:0 0 .4rem !important;border:none !important;padding:0 !important;
}
.markdown-section h1+p{
  font-size:1rem !important;color:var(--text-muted) !important;
  margin-bottom:2rem !important;line-height:1.7 !important;
}
.markdown-section h2{
  font-size:1.25rem !important;font-weight:700 !important;
  letter-spacing:-.02em !important;color:var(--text) !important;
  margin:2.5rem 0 .6rem !important;
  padding-bottom:.55rem !important;
  border-bottom:1px solid var(--border) !important;
}
.markdown-section h3{
  font-size:1rem !important;font-weight:600 !important;
  color:var(--text) !important;margin:1.75rem 0 .35rem !important;
}
.markdown-section h4{
  font-size:.72rem !important;font-weight:700 !important;
  text-transform:uppercase !important;letter-spacing:.07em !important;
  color:var(--text-dim) !important;margin:1.4rem 0 .3rem !important;
}
.markdown-section p{
  margin:0 0 1rem !important;line-height:1.8 !important;
  color:var(--text-muted) !important;
}
/* Links - underline only inside body paragraphs */
.markdown-section p a,
.markdown-section li a,
.markdown-section td a{
  color:var(--accent) !important;
  text-decoration:underline;
  text-decoration-color:rgba(37,88,217,.3);
  text-underline-offset:2px;
  transition:text-decoration-color .15s;
}
[data-theme="dark"] .markdown-section p a,
[data-theme="dark"] .markdown-section li a,
[data-theme="dark"] .markdown-section td a{
  text-decoration-color:rgba(123,144,255,.3);
}
.markdown-section p a:hover,
.markdown-section li a:hover,
.markdown-section td a:hover{
  text-decoration-color:var(--accent);
}
/* Heading anchor links — no underline */
.markdown-section h1 a,
.markdown-section h2 a,
.markdown-section h3 a,
.markdown-section h4 a{
  color:inherit !important;
  text-decoration:none !important;
}
.markdown-section strong{color:var(--text);font-weight:600}
.markdown-section hr{
  border:none !important;border-top:1px solid var(--border) !important;margin:2rem 0 !important;
}
.markdown-section ul,.markdown-section ol{
  padding-left:1.4rem !important;margin:0 0 1rem !important;
}
.markdown-section li{
  margin-bottom:.35rem !important;line-height:1.75 !important;
  color:var(--text-muted) !important;
}
.markdown-section ul li::marker{color:var(--accent)}

/* Inline code */
.markdown-section code:not([class*="lang-"]):not([class*="language-"]){
  font-family:'JetBrains Mono',monospace !important;
  font-size:.8em !important;font-weight:500 !important;
  color:var(--accent) !important;background:var(--accent-soft) !important;
  border:1px solid var(--accent-ring) !important;
  border-radius:4px !important;padding:.1em .38em !important;
}

/* Code blocks */
.markdown-section pre{
  background:#0d1117 !important;
  border:1px solid rgba(255,255,255,.06) !important;
  border-radius:10px !important;
  margin:1.25rem 0 !important;padding:0 !important;
  overflow:hidden !important;
  box-shadow:0 4px 20px rgba(0,0,0,.18) !important;
  position:relative !important;
}
.markdown-section pre::before{
  content:'';display:block;height:32px;
  background:#161b22;
  border-bottom:1px solid rgba(255,255,255,.05);
  background-image:
    radial-gradient(circle,#ff5f57 4px,transparent 4px),
    radial-gradient(circle,#febc2e 4px,transparent 4px),
    radial-gradient(circle,#28c840 4px,transparent 4px);
  background-size:8px,8px,8px;
  background-position:12px center,24px center,36px center;
  background-repeat:no-repeat;
}
.markdown-section pre>code{
  display:block !important;
  font-family:'JetBrains Mono',monospace !important;
  font-size:.83rem !important;line-height:1.65 !important;
  color:#cdd9e5 !important;
  background:transparent !important;border:none !important;
  padding:16px 20px !important;overflow-x:auto !important;
}

/* Tables */
.markdown-section table{
  width:100% !important;border-collapse:separate !important;border-spacing:0 !important;
  border:1px solid var(--border) !important;border-radius:8px !important;
  overflow:hidden !important;font-size:.875rem !important;margin:1.25rem 0 !important;
}
.markdown-section thead{background:var(--bg-hover) !important}
.markdown-section th{
  padding:9px 13px !important;font-size:.7rem !important;font-weight:700 !important;
  text-transform:uppercase !important;letter-spacing:.06em !important;
  color:var(--text-dim) !important;
  border-bottom:1px solid var(--border) !important;text-align:left !important;
}
.markdown-section td{
  padding:9px 13px !important;color:var(--text-muted) !important;
  border-bottom:1px solid var(--border) !important;
}
.markdown-section tr:last-child td{border-bottom:none !important}
.markdown-section tr:hover td{background:var(--bg-hover) !important}

/* Images */
.markdown-section img:not(.no-shadow){
  border-radius:8px !important;
  border:1px solid var(--border) !important;
  box-shadow:0 2px 12px rgba(0,0,0,.08) !important;
  margin:1.25rem 0 !important;max-width:100% !important;
}

/* Blockquotes */
.markdown-section blockquote{
  background:var(--accent-soft) !important;border:none !important;
  border-left:3px solid var(--accent) !important;
  border-radius:0 var(--r) var(--r) 0 !important;
  margin:1.25rem 0 !important;padding:11px 16px !important;
}
.markdown-section blockquote p{
  margin:0 !important;color:var(--accent) !important;
  -webkit-text-fill-color:var(--accent) !important;
  font-size:.9rem !important;
}

/* ─── COPY BUTTON ─────────────────────────────────────────── */
.docsify-copy-code-button{
  background:rgba(255,255,255,.07) !important;color:#8b949e !important;
  border:1px solid rgba(255,255,255,.08) !important;border-radius:4px !important;
  font-family:'Plus Jakarta Sans',sans-serif !important;font-size:.68rem !important;
  font-weight:600 !important;
  top:8px !important;right:9px !important;transition:all .15s !important;
}
.docsify-copy-code-button:hover{background:rgba(255,255,255,.16) !important;color:#fff !important}

/* ─── PAGINATION ──────────────────────────────────────────── */
.docsify-pagination-container{
  border-top:1px solid var(--border) !important;
  padding-top:24px !important;margin-top:40px !important;
}
.pagination-item{
  flex:1 1 0 !important;
}
.pagination-item a{
  display:flex !important;
  min-height:74px;
  align-items:center;
  padding:14px 18px !important;
  border:1px solid var(--border) !important;
  border-radius:10px !important;
  background:var(--bg-card) !important;
  color:var(--accent) !important;font-weight:600 !important;
  text-decoration:none !important;
}
.pagination-item a:hover{
  border-color:var(--accent) !important;
  box-shadow:0 8px 24px var(--accent-ring) !important;
}

/* ─── CUSTOM COMPONENTS (in markdown) ────────────────────── */
.hero{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:48px 36px 40px;
  text-align:center;
  margin-bottom:36px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%,var(--accent-soft) 0%,transparent 70%);
  pointer-events:none;
}
.hero-logo{
  display:block;margin:0 auto 20px;width:52px;
  animation:float 5s ease-in-out infinite;
  filter:drop-shadow(0 4px 10px var(--accent-ring));
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero h1{
  font-size:clamp(2rem,5vw,3.2rem) !important;
  font-weight:800 !important;letter-spacing:-.05em !important;
  color:var(--text) !important;
  margin:0 0 6px !important;border:none !important;padding:0 !important;
  -webkit-text-fill-color:var(--text) !important;
}
.hero-sub{
  font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-dim);margin:0 0 14px;
}
.hero-desc{
  font-size:1rem;color:var(--text-muted);
  max-width:480px;margin:0 auto 28px;line-height:1.75;
}
.hero-btns{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:28px;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 20px;border-radius:var(--r);
  font-size:.88rem;font-weight:600;
  text-decoration:none !important;transition:all .18s var(--ease);cursor:pointer;border:none;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.btn-primary{
  background:var(--accent) !important;color:#fff !important;
  box-shadow:0 1px 3px var(--accent-ring),0 4px 14px var(--accent-ring);
}
.btn-primary:hover{
  filter:brightness(1.1);transform:translateY(-2px);
  box-shadow:0 4px 16px var(--accent-ring);
}
.btn-outline{
  background:var(--bg-card) !important;color:var(--text) !important;
  border:1.5px solid var(--border);
}
.btn-outline:hover{
  border-color:var(--accent) !important;color:var(--accent) !important;transform:translateY(-2px);
}
.hero-pills{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
}
.pill{
  background:var(--bg-hover);border:1px solid var(--border);border-radius:100px;
  padding:5px 13px;font-size:.78rem;font-weight:500;color:var(--text-muted);
  transition:all .15s;
}
.pill:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:12px;margin:1.75rem 0;
}
.card{
  display:flex !important;flex-direction:column !important;gap:6px !important;
  padding:18px !important;
  background:var(--bg-card) !important;
  border:1px solid var(--border) !important;
  border-radius:8px !important;
  text-decoration:none !important;color:var(--text-muted) !important;
  transition:all .18s var(--ease) !important;
}
.card:hover{
  border-color:var(--accent) !important;
  box-shadow:0 4px 16px var(--accent-ring) !important;
  transform:translateY(-2px) !important;
}
.card-icon{font-size:1.25rem;line-height:1;margin-bottom:2px}
.card-title{font-size:.9rem !important;font-weight:700 !important;color:var(--text) !important;margin:0 !important}
.card-desc{font-size:.8rem !important;color:var(--text-muted) !important;line-height:1.55 !important;margin:0 !important}
.card-arrow{margin-top:auto;padding-top:10px;font-size:.78rem;font-weight:600;color:var(--accent)}

.callout{
  display:flex;gap:11px;padding:12px 16px;
  border-radius:0 var(--r) var(--r) 0;
  margin:1.25rem 0;font-size:.875rem;line-height:1.65;border-left:3px solid;
}
.callout.info  {background:#eff6ff;border-color:#3b82f6;color:#1d4ed8}
.callout.success,
.callout.tip   {background:#f0fdf4;border-color:#22c55e;color:#15803d}
.callout.warning,
.callout.warn  {background:#fffbeb;border-color:#f59e0b;color:#b45309}
.callout.danger{background:#fef2f2;border-color:#ef4444;color:#b91c1c}
[data-theme="dark"] .callout.info  {background:rgba(59,130,246,.1);color:#93c5fd}
[data-theme="dark"] .callout.success,
[data-theme="dark"] .callout.tip   {background:rgba(34,197,94,.1);color:#86efac}
[data-theme="dark"] .callout.warning,
[data-theme="dark"] .callout.warn  {background:rgba(245,158,11,.1);color:#fcd34d}
[data-theme="dark"] .callout.danger{background:rgba(239,68,68,.1);color:#fca5a5}
.callout-icon{font-size:.95rem;flex-shrink:0;margin-top:1px}
.callout div,
.callout p{margin:0 !important}
.callout a{color:inherit !important}

.journey-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin:1.5rem 0 2rem;
}
.journey-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  box-shadow:0 1px 2px rgba(15,23,42,.03);
}
.journey-kicker{
  font-size:.68rem;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}
.journey-card h3{
  margin:0 0 8px !important;
  font-size:1rem !important;
}
.journey-card p{
  margin:0 !important;
}

.tour-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
  margin:1rem 0 2rem;
}
.tour-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(15,23,42,.05);
  height:100%;
  display:flex;
  flex-direction:column;
}
.tour-thumb{
  display:block;
  background:linear-gradient(180deg,var(--bg-hover),transparent);
}
.tour-thumb img{
  display:block;
  width:100%;
  height:auto;
  margin:0 !important;
  border:none !important;
  border-radius:0 !important;
  box-shadow:none !important;
}
.tour-body{
  padding:14px 15px 16px;
  display:flex;
  flex-direction:column;
  flex:1;
}
.tour-title{
  font-size:.96rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:6px;
}
.tour-body p{
  margin:0 0 .85rem !important;
  font-size:.83rem !important;
  line-height:1.6 !important;
}
.tour-body code{
  word-break:break-word;
}
.tour-meta{
  font-size:.74rem;
  color:var(--text-dim);
  margin-top:auto;
}

/* ─── BACK TO TOP ─────────────────────────────────────────── */
#back-top{
  position:fixed;bottom:28px;right:24px;
  width:36px;height:36px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.85rem;color:var(--text-muted);
  box-shadow:0 2px 10px rgba(0,0,0,.1);
  opacity:0;pointer-events:none;
  transition:all .2s var(--ease);z-index:500;
}
#back-top.visible{opacity:1;pointer-events:auto}
#back-top:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ─── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ─── MOBILE ──────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{
    width:300px !important;
  }
  .content{
    left:0 !important;
  }
  .markdown-section{padding:28px 20px 64px !important}
  .markdown-section h1{font-size:1.55rem !important}
  .hero{padding:36px 20px 32px !important}
  .card-grid{grid-template-columns:1fr !important}
  .journey-grid,.tour-grid{grid-template-columns:1fr !important}
  .hero-btns .btn{width:100%;justify-content:center}
}

/* ─── FOCUS ───────────────────────────────────────────────── */
*:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
  border-radius:var(--r);
}
  </style>
</head>
<body>
  <!-- Scroll progress bar -->
  <div id="scroll-progress"></div>

  <!-- Back to top -->
  <div id="back-top" role="button" aria-label="Back to top" tabindex="0">↑</div>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name:        'ShrFlow',
      nameLink:    '#/',
      repo:        'https://github.com/Rahul-pamula/ShrFlow-V1',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      coverpage:   false,
      auto2top:    true,
      externalLinkTarget: '_blank',
      homepage:    'README.md',
      notFoundPage:'_404.md',

      search: {
        maxAge:      86400000,
        paths:       'auto',
        placeholder: 'Search docs…',
        noData:      'No results.',
        depth:       4,
      },
      copyCode: {
        buttonText:  'Copy',
        errorText:   'Error',
        successText: '✓',
      },
      pagination: {
        previousText: '← Prev',
        nextText:     'Next →',
        crossChapter: false,
      },
      plugins: [
        function(hook) {
          function normalizeHomeRoute() {
            if (window.location.hash === '#/README' || window.location.hash === '#/README.md') {
              history.replaceState(null, '', '#/');
            }
          }

          hook.init(function() {
            normalizeHomeRoute();

            // Intercept relative markdown links in HTML elements for SPA routing
            document.body.addEventListener('click', function(e) {
              var a = e.target.closest('a');
              if (a) {
                var href = a.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('#') && href.endsWith('.md')) {
                  e.preventDefault();
                  var route = href.replace(/\.md$/, '');
                  if (route.startsWith('./')) {
                    route = route.slice(2);
                  }
                  if (route.startsWith('/')) {
                    route = route.slice(1);
                  }
                  window.location.hash = '#/' + route;
                }
              }
            });
          });

          hook.doneEach(function() {
            normalizeHomeRoute();
            requestAnimationFrame(function() {
              window.scrollTo(0, 0);
              var content = document.querySelector('.content');
              if (content) content.scrollTop = 0;
            });
          });
        },

        /* ── Brand + dark toggle injected in sidebar ── */
        function(hook) {
          hook.doneEach(function() {
            /* Apply saved theme first */
            var saved = localStorage.getItem('sf-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);

            /* Brand block in sidebar */
            var appName = document.querySelector('.sidebar .app-name');
            if (appName && !appName.querySelector('.sf-header')) {
              var header = document.createElement('div');
              header.className = 'sf-header';
              header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);';
              header.innerHTML = '<div style="display:flex;flex-direction:column;gap:2px;">' +
                '<span class="sf-name">ShrFlow</span>' +
                '<span class="sf-tag">Documentation</span>' +
                '</div>';

              var btn = document.createElement('button');
              btn.id = 'theme-btn';
              btn.setAttribute('aria-label','Toggle dark mode');
              btn.setAttribute('title','Toggle dark/light mode');
              btn.textContent = saved === 'dark' ? '☀︎' : '☾';
              btn.addEventListener('click', function() {
                var cur = document.documentElement.getAttribute('data-theme');
                var next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('sf-theme', next);
                btn.textContent = next === 'dark' ? '☀︎' : '☾';
              });
              header.appendChild(btn);
              appName.innerHTML = '';
              appName.appendChild(header);
            }

            var homeLink = document.querySelector('.sidebar .app-name-link');
            if (homeLink) {
              homeLink.setAttribute('href', '#/');
            }
          });
        },

        /* ── Scroll progress bar ── */
        function(hook) {
          hook.doneEach(function() {
            var bar = document.getElementById('scroll-progress');
            function update() {
              var el = document.scrollingElement || document.documentElement;
              var total = el.scrollHeight - el.clientHeight;
              var pct = total > 0 ? (el.scrollTop / total) * 100 : 0;
              if (bar) bar.style.width = Math.min(100, pct) + '%';
            }
            if (!window.__sfScrollProgressInit) {
              window.addEventListener('scroll', update, {passive:true});
              window.__sfScrollProgressInit = true;
            }
            update();
          });
        },

        /* ── Mermaid diagrams ── */
        function(hook) {
          hook.beforeEach(function(markdown) {
            return markdown.replace(/```mermaid\s*([\s\S]*?)```/g, function(_, diagram) {
              return '\n<div class="mermaid">' + diagram.trim() + '</div>\n';
            });
          });

          hook.doneEach(function() {
            if (!window.mermaid) return;
            requestAnimationFrame(function() {
              window.mermaid.run({
                querySelector: '.mermaid'
              });
            });
          });
        },

        /* ── Back to top ── */
        function(hook) {
          hook.doneEach(function() {
            var btn = document.getElementById('back-top');
            if (!btn) return;

            function syncBackTop() {
              if (window.scrollY > 400) { btn.classList.add('visible'); }
              else { btn.classList.remove('visible'); }
            }

            if (!window.__sfBackTopInit) {
              window.addEventListener('scroll', syncBackTop, {passive:true});
              btn.addEventListener('click', function() {
                window.scrollTo({top:0, behavior:'smooth'});
              });
              btn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                  e.preventDefault();
                  window.scrollTo({top:0, behavior:'smooth'});
                }
              });
              window.__sfBackTopInit = true;
            }

            syncBackTop();
          });
        },
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      maxTextSize: 200000
    });
    window.mermaid = mermaid;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
</body>
</html>
